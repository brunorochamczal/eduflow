<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunex - Gestão Escolar</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: center; gap: 25px; position: sticky; top: 0; z-index: 100; }
        nav span { cursor: pointer; font-weight: 500; transition: 0.3s; padding: 5px 10px; }
        nav span:hover { color: var(--accent); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .tab-content { display: none; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #2980b9; }
        .card { background: #fafafa; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: center; }
        .stat-box { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        .stat-box h3 { margin: 0; color: #7f8c8d; font-size: 0.9rem; }
        .stat-box p { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <span onclick="showTab('tab-matricula')">Matrículas</span>
    <span onclick="showTab('tab-financeiro')">Pagamentos</span>
    <span onclick="showTab('tab-diario')">Diário</span>
    <span onclick="showTab('tab-relatorios')">Relatórios</span>
</nav>

<div class="container">
    <div id="tab-matricula" class="tab-content active">
        <h2>Registro de Matrícula (1º ao 5º Ano)</h2>
        <input type="text" id="nome" placeholder="Nome completo do aluno">
        <select id="serie">
            <option value="1º Ano">1º Ano</option>
            <option value="2º Ano">2º Ano</option>
            <option value="3º Ano">3º Ano</option>
            <option value="4º Ano">4º Ano</option>
            <option value="5º Ano">5º Ano</option>
        </select>
        <select id="turno">
            <option value="Manhã">Manhã</option>
            <option value="Tarde">Tarde</option>
        </select>
        <button onclick="salvarMatricula()">Confirmar Matrícula</button>
    </div>

    <div id="tab-financeiro" class="tab-content">
        <h2>Recebimento de Matrículas</h2>
        <div id="lista-financeiro">Carregando alunos...</div>
    </div>

    <div id="tab-diario" class="tab-content">
        <h2>Diário de Classe</h2>
        <select id="diario-serie">
            <option value="1º Ano">1º Ano</option>
            <option value="2º Ano">2º Ano</option>
            <option value="3º Ano">3º Ano</option>
            <option value="4º Ano">4º Ano</option>
            <option value="5º Ano">5º Ano</option>
        </select>
        <textarea id="diario-conteudo" placeholder="Descreva o que foi trabalhado hoje..."></textarea>
        <button onclick="salvarDiario()">Gravar no Diário</button>
    </div>

    <div id="tab-relatorios" class="tab-content">
        <h2>Relatórios de Gestão</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <h3>Total Recebido</h3>
                <p id="val-total">R$ 0,00</p>
            </div>
            <div class="stat-box">
                <h3>Alunos Inadimplentes</h3>
                <p id="val-devedores">0</p>
            </div>
        </div>
    </div>
</div>

<script>
    // IMPORTANTE: Após o deploy, altere para a URL que o Railway te der.
    const API = window.location.origin; 

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'tab-financeiro') loadFinanceiro();
        if(id === 'tab-relatorios') loadRelatorios();
    }

    async function salvarMatricula() {
        const dados = {
            nome: document.getElementById('nome').value,
            serie: document.getElementById('serie').value,
            turno: document.getElementById('turno').value
        };
        if(!dados.nome) return alert("Preencha o nome!");
        
        await fetch(`${API}/alunos`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        });
        alert("Matrícula realizada!");
        document.getElementById('nome').value = "";
    }

    async function loadFinanceiro() {
        const res = await fetch(`${API}/alunos`);
        const alunos = await res.json();
        const lista = document.getElementById('lista-financeiro');
        lista.innerHTML = alunos.length ? '' : 'Nenhum aluno cadastrado.';
        alunos.forEach(a => {
            lista.innerHTML += `
                <div class="card">
                    <div>
                        <strong>${a.nome}</strong><br>
                        <small>${a.serie} - ${a.turno}</small>
                    </div>
                    <div>
                        ${a.pago ? '<span style="color:green">● Pago</span>' : 
                        `<button style="width:auto; padding:5px 10px;" onclick="pagar(${a.id})">Confirmar Pagamento</button>`}
                    </div>
                </div>
            `;
        });
    }

    async function pagar(id) {
        await fetch(`${API}/pagamentos`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({aluno_id: id, valor: 150.00})
        });
        loadFinanceiro();
    }

    async function salvarDiario() {
        const conteudo = document.getElementById('diario-conteudo').value;
        if(!conteudo) return alert("Escreva o conteúdo!");
        
        await fetch(`${API}/diario`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                serie: document.getElementById('diario-serie').value,
                turno: "Geral",
                conteudo: conteudo
            })
        });
        alert("Diário salvo!");
        document.getElementById('diario-conteudo').value = "";
    }

    async function loadRelatorios() {
        const res = await fetch(`${API}/relatorios`);
        const data = await res.json();
        document.getElementById('val-total').innerText = `R$ ${data.faturamento.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        document.getElementById('val-devedores').innerText = data.inadimplentes;
    }
</script>
</body>
</html>
