<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunex | Gestão Escolar Inteligente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="auth-container">
        <div class="login-card">
            <img src="{{ url_for('static', filename='edu.gif') }}" alt="Logo Edunex" class="main-logo">
            <h1>Edunex</h1>
            <p>Gestão Escolar com Inteligência</p>
            
            <div class="input-group">
                <div class="field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="user" placeholder="Usuário" required>
                </div>
                <div class="field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="pass" placeholder="Senha" required>
                </div>
            </div>
            
            <button onclick="handleLogin()" id="btn-login">ACESSAR SISTEMA</button>
        </div>
    </div>

    <div id="dashboard-screen" class="main-layout hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="{{ url_for('static', filename='edu.gif') }}" class="mini-logo">
                <span>EDUNEX</span>
            </div>
            <nav>
                <button onclick="showSection('home')"><i class="fa-solid fa-house"></i> Início</button>
                <button onclick="showSection('comunicados')"><i class="fa-solid fa-bullhorn"></i> Comunicados</button>
                <button onclick="handleLogout()" class="btn-exit"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h2 id="section-title">Dashboard Principal</h2>
                <div class="user-info">
                    <span id="user-display">Administrador</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <section id="home-section" class="grid-menu">
                <div class="card-btn" onclick="showSection('alunos')">
                    <div class="icon-box blue"><i class="fa-solid fa-user-graduate"></i></div>
                    <h3>Alunos</h3>
                    <p>Matrículas e Frequência</p>
                </div>

                <div class="card-btn" onclick="showSection('professores')">
                    <div class="icon-box green"><i class="fa-solid fa-chalkboard-user"></i></div>
                    <h3>Professores</h3>
                    <p>Corpo Docente</p>
                </div>

                <div class="card-btn" onclick="showSection('turmas')">
                    <div class="icon-box orange"><i class="fa-solid fa-school"></i></div>
                    <h3>Turmas</h3>
                    <p>Alocação e Horários</p>
                </div>

                <div class="card-btn" onclick="showSection('disciplinas')">
                    <div class="icon-box purple"><i class="fa-solid fa-book-open"></i></div>
                    <h3>Disciplinas</h3>
                    <p>Grade Curricular</p>
                </div>

                <div class="card-btn" onclick="showSection('financeiro')">
                    <div class="icon-box gold"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                    <h3>Financeiro</h3>
                    <p>Cobrança via WhatsApp</p>
                </div>

                <div class="card-btn" onclick="showSection('radar')">
                    <div class="icon-box red"><i class="fa-solid fa-satellite-dish"></i></div>
                    <h3>Radar</h3>
                    <p>Risco de Evasão</p>
                </div>
            </section>

            <section id="dynamic-content" class="hidden">
                <div class="header-module">
                    <button onclick="showSection('home')" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
                </div>
                <div id="module-container">
                    </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
