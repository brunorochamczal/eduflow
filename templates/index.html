<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunex | Gestão Escolar Inteligente</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imgs/favoricon.png') }}">
</head>
<body>

    <div id="login-screen" class="auth-container">
        <div class="login-card">
            <img src="{{ url_for('static', filename='imgs/edu.gif') }}" class="mini-logo">
            
            <div class="login-fields">
                <div class="field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="user" placeholder="Usuário" required>
                </div>
                
                <div class="field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="pass" placeholder="Senha" required>
                </div>
            </div>
            
            <button id="btn-login" onclick="handleLogin()">ACESSAR SISTEMA</button>
            <p class="footer-text">Edunex &copy; 2026 - Gestão Inteligente</p>
        </div>
    </div>

    <div id="dashboard-screen" class="dashboard-container hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="{{ url_for('static', filename='imgs/edu.gif') }}" class="side-logo">
                <h3>Edunex</h3>
            </div>
            <nav class="side-nav">
                <button onclick="showSection('home')"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
                <button onclick="showSection('alunos')"><i class="fa-solid fa-user-graduate"></i> Alunos</button>
                <button onclick="showSection('professores')"><i class="fa-solid fa-chalkboard-user"></i> Professores</button>
                <button onclick="showSection('financeiro')"><i class="fa-solid fa-wallet"></i> Financeiro</button>
                <button onclick="handleLogout()" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="welcome">
                    <h1>Olá, <span id="user-display">Usuário</span>!</h1>
                    <p>Bem-vindo ao painel administrativo.</p>
                </div>
            </header>

            <section id="home-section" class="grid-menu">
                <div class="card-btn" onclick="showSection('alunos')">
                    <div class="icon-box blue"><i class="fa-solid fa-user-plus"></i></div>
                    <h3>Matrículas</h3>
                    <p>Gerenciar Alunos</p>
                </div>

                <div class="card-btn" onclick="showSection('professores')">
                    <div class="icon-box purple"><i class="fa-solid fa-users-gear"></i></div>
                    <h3>Corpo Docente</h3>
                    <p>Gestão de Professores</p>
                </div>

                <div class="card-btn" onclick="showSection('turmas')">
                    <div class="icon-box green"><i class="fa-solid fa-school"></i></div>
                    <h3>Turmas</h3>
                    <p>Alocação de Horários</p>
                </div>

                <div class="card-btn" onclick="showSection('financeiro')">
                    <div class="icon-box gold"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                    <h3>Financeiro</h3>
                    <p>Status de Pagamentos</p>
                </div>

                <div class="card-btn" onclick="showSection('radar')">
                    <div class="icon-box red"><i class="fa-solid fa-satellite-dish"></i></div>
                    <h3>Radar</h3>
                    <p>Risco de Evasão</p>
                </div>
            </section>

            <section id="dynamic-content" class="hidden">
                <div class="module-header">
                    <h2 id="section-title">Módulo</h2>
                </div>
                <div id="module-container">
                    </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
